# GitHub Actions CI: Python/JS checks and Android build on push and pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m compileall phone_link

      - name: JavaScript syntax check
        shell: pwsh
        run: |
          node --check phone_link/static/app.js
          node --check phone_link/launcher_static/app.js
          node --check phone_link/wake_static/app.js

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        run: bash android_companion/gradlew -p android_companion assembleDebug
