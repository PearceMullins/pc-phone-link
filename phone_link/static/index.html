<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PC Phone Link</title>
  <link rel="stylesheet" href="/assets/styles.css?v=20260702b">
</head>
<body>
  <div id="app">
    <aside id="windowDrawer" class="window-drawer open">
      <div class="drawer-header">
        <div>
          <p class="eyebrow">PC Phone Link</p>
          <h1>Windows</h1>
        </div>
        <button id="refreshWindows" class="ghost-button" type="button">Refresh</button>
      </div>
      <div id="windowList" class="window-list"></div>
      <section class="drawer-settings">
        <label class="setting-label" for="mouseSpeed">
          <span>Mouse speed</span>
          <strong id="mouseSpeedValue">1.00x</strong>
        </label>
        <input
          id="mouseSpeed"
          class="speed-slider"
          type="range"
          min="0.5"
          max="8"
          step="0.1"
          value="2.5"
        >
        <label class="setting-label" for="streamFps">
          <span>Frame rate</span>
          <strong id="streamFpsValue">20 fps</strong>
        </label>
        <input
          id="streamFps"
          class="speed-slider"
          type="range"
          min="1"
          max="30"
          step="1"
          value="20"
        >
        <label class="setting-label" for="streamWidth">
          <span>Resolution</span>
          <strong id="streamWidthValue">Auto</strong>
        </label>
        <select id="streamWidth" class="setting-select">
          <option value="auto">Auto (fit phone)</option>
          <option value="1920">1920 px (sharpest)</option>
          <option value="1600">1600 px</option>
          <option value="1280">1280 px</option>
          <option value="960">960 px</option>
          <option value="720">720 px</option>
          <option value="480">480 px (fastest)</option>
        </select>
        <label class="toggle-setting" for="followMouse">
          <span>Follow mouse</span>
          <input id="followMouse" type="checkbox">
        </label>
        <label class="setting-label" for="textScale">
          <span>PC text size</span>
          <strong id="textScaleValue">100%</strong>
        </label>
        <input
          id="textScale"
          class="speed-slider"
          type="range"
          min="100"
          max="225"
          step="1"
          value="100"
        >
        <button id="applyTextScale" class="ghost-button" type="button" disabled>Apply text size</button>
        <div class="drawer-button-row">
          <button id="textSmaller" class="ghost-button" type="button">Smaller</button>
          <button id="textLarger" class="ghost-button" type="button">Larger</button>
        </div>
        <label class="setting-label" for="fitShape">
          <span>Screen shape</span>
          <strong id="fitShapeValue">Phone</strong>
        </label>
        <select id="fitShape" class="setting-select">
          <option value="auto">Phone</option>
          <option value="16-9">16:9</option>
          <option value="16-10">16:10</option>
          <option value="4-3">4:3</option>
          <option value="1-1">Square</option>
          <option value="3-4">Tall</option>
        </select>
        <button id="applyFitShape" class="ghost-button" type="button" disabled>Apply shape</button>
        <label class="setting-label" for="controlMode">
          <span>Screen tapping</span>
        </label>
        <select id="controlMode" class="setting-select">
          <option value="trackpad">Trackpad</option>
          <option value="touch">Direct touch</option>
        </select>
        <div class="drawer-button-row">
          <button id="rightClickMode" class="ghost-button" type="button">Right click</button>
          <button id="doubleClickMode" class="ghost-button" type="button">Double click</button>
        </div>
        <div class="drawer-button-row">
          <button id="scrollUp" class="ghost-button" type="button">Scroll up</button>
          <button id="scrollDown" class="ghost-button" type="button">Scroll down</button>
        </div>
        <section class="trusted-devices-section">
          <div class="trusted-devices-header">
            <span>Trusted phones</span>
            <button id="refreshTrustedDevices" class="ghost-button compact-button" type="button">Refresh</button>
          </div>
          <p id="trustedDevicesStatus" class="trusted-devices-status">No saved phones loaded.</p>
          <div id="trustedDevices" class="trusted-devices-list"></div>
        </section>
      </section>
    </aside>

    <header class="topbar">
      <button id="toggleDrawer" class="ghost-button" type="button">Windows</button>
      <div class="title-stack">
        <span class="eyebrow" id="deviceName">Phone link</span>
        <strong id="selectedWindowTitle">Open Windows to choose an app or fullscreen view</strong>
      </div>
      <div class="topbar-actions">
        <button id="powerToggle" class="ghost-button" type="button">Power</button>
        <button id="fitToggle" class="ghost-button" type="button">Fit</button>
        <button id="toggleKeyboard" class="ghost-button" type="button">Keyboard</button>
        <div id="powerMenu" class="power-menu hidden">
          <button type="button" class="power-menu-item" data-power-action="lock">Lock</button>
          <button type="button" class="power-menu-item" data-power-action="sleep">Sleep</button>
          <button type="button" class="power-menu-item" data-power-action="restart">Restart</button>
          <button type="button" class="power-menu-item power-menu-danger" data-power-action="shutdown">Shut down</button>
        </div>
      </div>
    </header>

    <main id="viewerShell" class="viewer-shell">
      <img id="remoteView" alt="Selected window stream">
      <div id="touchLayer" class="touch-layer"></div>
      <div id="emptyState" class="empty-state" hidden></div>
      <div id="statusPill" class="status-pill">Ready</div>
    </main>

    <section id="keyboardPanel" class="keyboard-panel hidden">
      <div class="composer-actions">
        <button id="toggleMessageHistory" class="ghost-button message-history-toggle" type="button" hidden>
          Show past messages
        </button>
        <button id="clearTextInput" class="ghost-button composer-clear-button" type="button">Clear Chat</button>
      </div>
      <section id="messageHistorySection" class="message-history-section" hidden>
        <p class="eyebrow">Past messages</p>
        <div id="messageHistory" class="message-history-list"></div>
      </section>
      <form id="textForm" class="text-form">
        <textarea
          id="textInput"
          inputmode="text"
          autocomplete="off"
          autocapitalize="sentences"
          spellcheck="true"
          rows="1"
          placeholder="Your phone keyboard now types into the selected PC window"
        ></textarea>
        <button id="sendText" class="primary-button" type="submit">Send</button>
      </form>
    </section>

    <section id="authPanel" class="auth-panel">
      <form id="authForm" class="auth-card">
        <h2>Connect your phone</h2>
        <p id="pairingStatus" class="auth-status">Send a connection request to this PC, then approve it on both devices to pair this browser.</p>
        <input id="pairingDeviceName" type="text" placeholder="This phone" autocomplete="off">
        <div class="auth-actions">
          <button id="requestPairing" class="ghost-button" type="submit">Send request</button>
          <button id="approvePairing" class="primary-button" type="button" disabled>Approve on this phone</button>
        </div>
      </form>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="/assets/app.js?v=20260702b" defer></script>
</body>
</html>
